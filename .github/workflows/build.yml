name: Build humans.json

on:
  push:
    paths:
      - 'entries/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate JSON
        run: python scripts/md2json.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/humans.json
          git diff --staged --quiet || git commit -m "🤖 auto-update humans.json"
          git push
